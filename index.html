<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Music - 音乐认知训练</title>
  <link rel="stylesheet" href="styles-spotify.css">
</head>
<body>
  <!-- 头部品牌 -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" stroke="white" stroke-width="2" fill="none"/>
          <path d="M8 12C8 12 10 10 12 10C14 10 14 12 16 12C18 12 19 10 19 10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 16C8 16 10 14 12 14C14 14 14 16 16 16C18 16 19 14 19 14" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 20C8 20 10 18 12 18C14 18 14 20 16 20C18 20 19 18 19 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">Brain Music</div>
    </div>
    <p class="tagline">用科学设计的音乐训练你的大脑</p>
  </header>

  <!-- 主容器 -->
  <div class="container">
    <!-- 视图 1: 目标选择 -->
    <div id="view-targets" class="view active">
      <div class="card">
        <h2 style="font-size: 20px; margin-bottom: 8px;">选择训练目标</h2>
        <p style="color: var(--text-secondary); font-size: 14px;">根据你的需求选择合适的训练</p>
      </div>
      
      <div class="target-grid" id="targetGrid">
        <!-- 目标卡片由 JS 动态生成 -->
      </div>
    </div>

    <!-- 视图 2: 播放 -->
    <div id="view-player" class="view">
      <div class="card player-card">
        <div class="player-icon" id="playerIcon"><!-- 图标由 JS 动态插入 --></div>
        <div class="player-title" id="playerTitle">深度专注</div>
        <div class="player-status">准备进入训练状态</div>
        
        <!-- YouTube 内嵌播放器容器 -->
        <div id="playerContainer"></div>
        
        <!-- 训练进度 -->
        <div class="training-progress" id="trainingProgress">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-text" id="progressText">
            训练剩余：<span id="countdown">25:00</span>
          </div>
        </div>
        
        <button class="btn btn-primary" id="finishBtn" disabled>
          完成训练，进入打卡
        </button>
      </div>
    </div>

    <!-- 视图 3: 打卡 -->
    <div id="view-checkin" class="view">
      <div class="progress-dots" id="progressDots"></div>
      
      <div class="card">
        <form class="checkin-form" id="checkinForm">
          <!-- 问题由 JS 动态生成 -->
        </form>
      </div>
      
      <button class="btn btn-primary mt-4" id="submitCheckin" style="width: 100%; max-width: 320px;">
        生成脑区快照 →
      </button>
    </div>

    <!-- 视图 4: 热力图结果 -->
    <div id="view-result" class="view">
      <div class="card brain-viz">
        <div class="brain-title">本次脑区激活快照</div>
        
        <svg class="brain-diagram" viewBox="0 0 200 240">
          <!-- 脑区图示 -->
          <path class="brain-outline" d="M100 20 C60 20 30 60 30 120 C30 180 60 220 100 220 C140 220 170 180 170 120 C170 60 140 20 100 20"/>
          <circle class="brain-region" id="region-prefrontal" cx="100" cy="50" r="25"/>
          <circle class="brain-region" id="region-amygdala" cx="70" cy="90" r="18"/>
          <circle class="brain-region" id="region-hippocampus" cx="130" cy="90" r="18"/>
          <circle class="brain-region" id="region-basal" cx="100" cy="130" r="22"/>
          <circle class="brain-region" id="region-accumbens" cx="100" cy="160" r="15"/>
          <circle class="brain-region" id="region-dmn" cx="100" cy="190" r="20"/>
          <ellipse class="brain-region" id="region-insula" cx="55" cy="130" rx="15" ry="25"/>
          <ellipse class="brain-region" id="region-auditory" cx="145" cy="130" rx="15" ry="25"/>
        </svg>
        
        <div class="region-list" id="regionList">
          <!-- 脑区评分由 JS 动态生成 -->
        </div>
      </div>
      
      <div style="text-align: center; margin-top: 16px;">
        <button class="btn btn-primary" id="newSessionBtn" style="display: inline-block; margin: 0 auto;">开始新训练</button>
      </div>
    </div>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item active" data-view="targets">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
      </svg>
      <span>训练</span>
    </a>
    <a href="#" class="nav-item" data-view="result">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1" fill="currentColor"/>
        <rect x="14" y="3" width="7" height="7" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1" fill="currentColor" opacity="0.3"/>
      </svg>
      <span>我的</span>
    </a>
  </nav>

  <script src="target-icons.js"></script>
  <script src="brain-mapping.js"></script>
  <script src="app.js"></script>
  <script>loadDB();</script>
</body>
</html>
